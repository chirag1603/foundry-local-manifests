apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-config
spec:
  interval: 10m
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.19.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-config
  values:
    crds:
      enabled: true
      keep: true
    image:
      tag: v1.19.2
    webhook:
      image:
        tag: v1.19.2
    cainjector:
      image:
        tag: v1.19.2
    acmesolver:
      image:
        tag: v1.19.2
    startupapicheck:
      image:
        tag: v1.19.2
