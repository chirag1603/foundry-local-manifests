apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-config
spec:
  interval: 10m
  targetNamespace: cert-manager
  dependsOn:
    - name: cert-manager
  chart:
    spec:
      chart: trust-manager
      version: "v0.20.3"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-config
  values:
    image:
      tag: v0.20.3
    defaultPackage:
      enabled: false
    secretTargets:
      enabled: true
      authorizedSecretsAll: true
